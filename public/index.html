<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VeloCatalog - High-Performance Catalog</title>
  <meta name="description" content="Browse over 200,000 products instantly with optimized PostgreSQL cursor pagination.">
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Decorative Gradients -->
  <div class="bg-gradient bg-gradient-1"></div>
  <div class="bg-gradient bg-gradient-2"></div>

  <div class="app-container">
    
    <!-- Header -->
    <header class="app-header">
      <div class="logo-container">
        <span class="logo-icon">⚡</span>
        <h1 class="logo-text">Velo<span>Catalog</span></h1>
      </div>
      <div class="stats-badge" id="performance-stats">
        Database: 200,000+ items
      </div>
    </header>

    <!-- Controls (Category Filter & Limits) -->
    <section class="controls-section">
      <div class="categories-wrapper">
        <button class="category-btn active" data-category="">All Products</button>
        <button class="category-btn" data-category="electronics">Electronics</button>
        <button class="category-btn" data-category="fashion">Fashion</button>
        <button class="category-btn" data-category="books">Books</button>
        <button class="category-btn" data-category="sports">Sports</button>
        <button class="category-btn" data-category="toys">Toys</button>
        <button class="category-btn" data-category="home">Home</button>
        <button class="category-btn" data-category="beauty">Beauty</button>
        <button class="category-btn" data-category="automotive">Automotive</button>
      </div>

      <div class="config-row">
        <div class="input-group">
          <label for="limit-select">Items Per Page</label>
          <select id="limit-select" class="custom-select">
            <option value="12">12 Items</option>
            <option value="24" selected>24 Items</option>
            <option value="48">48 Items</option>
            <option value="100">100 Items</option>
          </select>
        </div>
        <div class="query-time-badge" id="query-time-badge">
          Query Time: <span id="query-time">0</span>ms
        </div>
      </div>
    </section>

    <!-- Product Grid -->
    <main class="products-grid-section">
      <div class="products-grid" id="products-grid">
        <!-- Skeleton Loaders injected here initially -->
      </div>
      
      <!-- Empty State -->
      <div class="empty-state hidden" id="empty-state">
        <span class="empty-icon">🔍</span>
        <h3>No products found</h3>
        <p>Try switching categories or check your database connection.</p>
      </div>

      <!-- Load More / Footer Actions -->
      <div class="pagination-container" id="pagination-container">
        <button class="load-more-btn" id="load-more-btn">
          <span>Load More Products</span>
          <div class="spinner hidden" id="btn-spinner"></div>
        </button>
        <p class="end-message hidden" id="end-message">You have viewed all products in this category.</p>
      </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <p>Built with Node.js, Express, Raw PostgreSQL & Keyset Cursor Pagination.</p>
    </footer>
  </div>

  <!-- Scripts -->
  <script src="app.js"></script>
</body>
</html>
